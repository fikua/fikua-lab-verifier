# Cloudflare Worker (Static Assets + handler) configuration.
#
# Serves the static UI under https://lab.fikua.com/verifier/* and proxies
# the role's API paths (.well-known/, oid4vci/, oauth/, oid4vp/, health,
# admin/, …) to the lab backend at https://lab-backend.fikua.com via
# Cloudflare Tunnel + Access Service Auth. See ADR 0008r1 (v4).

name = "fikua-lab-verifier"
main = "src/index.ts"
compatibility_date = "2026-05-22"

routes = [
    { pattern = "lab.fikua.com/verifier", custom_domain = false, zone_name = "fikua.com" },
    { pattern = "lab.fikua.com/verifier/*", custom_domain = false, zone_name = "fikua.com" }
]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"

# Backend reach (see ADR 0008r1):
#   LAB_BACKEND_ORIGIN     — plain var, the hostname Workers fetch().
#   CF_ACCESS_CLIENT_ID    — secret (wrangler secret put).
#   CF_ACCESS_CLIENT_SECRET — secret (wrangler secret put).
[vars]
LAB_BACKEND_ORIGIN = "https://lab-backend.fikua.com"
